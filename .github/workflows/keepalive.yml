name: Keep Render service alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://millesime-coffee-bot.onrender.com/ || true
