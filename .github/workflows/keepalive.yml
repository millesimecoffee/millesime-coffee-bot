name: Keep alive PRIMARY (every 5min)

# 3 workflows à offsets différents pour blindage maximal :
#   - keepalive.yml      → 0, 5, 10, 15, 20, 25... (offset 0)
#   - keepalive-bis.yml  → 2, 7, 12, 17, 22, 27... (offset 2)
#   - keepalive-ter.yml  → 4, 9, 14, 19, 24, 29... (offset 4)
# Résultat : un ping toutes les ~1m40 en moyenne, plusieurs sources indépendantes.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render service (3 tentatives)
        run: |
          for i in 1 2 3; do
            HTTP=$(curl -fsS -o /dev/null -w "%{http_code}" -m 90 \
              https://millesime-coffee-bot.onrender.com/health || echo "fail")
            echo "Tentative $i : HTTP $HTTP"
            [ "$HTTP" = "200" ] && exit 0
            sleep 8
          done
          exit 0
