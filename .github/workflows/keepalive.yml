name: Keep Render service alive

# Render free tier endort après 15 min sans HTTP entrant.
# GitHub Actions cron est "best effort" (peut avoir 5-15 min de retard).
# On ping toutes les 5 min pour garder une marge confortable.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render service
        run: |
          # 3 tentatives en cas de cold start lent (peut prendre 30-60s)
          for i in 1 2 3; do
            HTTP=$(curl -fsS -o /dev/null -w "%{http_code}" -m 90 \
              https://millesime-coffee-bot.onrender.com/ || echo "fail")
            echo "Tentative $i : HTTP $HTTP"
            [ "$HTTP" = "200" ] && exit 0
            sleep 5
          done
          exit 0  # Ne pas casser le workflow même si le bot est down
